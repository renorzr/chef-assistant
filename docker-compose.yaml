services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chef-assistant
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16
    container_name: chef-assistant-postgres
    restart: unless-stopped
    profiles:
      - with-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chef_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
